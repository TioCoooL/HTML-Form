<!DOCTYPE html>
<html>
    <body>
        <h1><center>Create Account</center></h1>
        <br>
        <table style="margin: auto;">
            <tr>
                <th>
                    <form>
                        <input type="text" id="fname" name="fname" placeholder="First Name">
                    </form>
                </th>
                <th>
                    <form>
                        <input type="text" id="lname" name="lname" placeholder="Last Name">
                    </form>
                </th>
            </tr>
            
            <tr>
                <th colspan="2">
                    <form>
                        <select id="count" name="count" style="width: 360px;">
                            <option value="none">Country</option>
                            <option value="Indonesia">Indonesia</option>
                            <option value="Japan">Japan</option>
                            <option value="South Korea">South Korea</option>
                            <option value="China">China</option>
                        </select>
                    </form>
                </th>
            </tr>

            <tr>
                <td>
                    <input type="text" id="email" name="email" placeholder="Email Address">
                </td>
                <td>
                    <input type="text" id="phNum" name="phNum" placeholder="Phone Number">
                </td>
            </tr>

            <tr>
                <td>
                    <input type="password" id="passcode" name="passcode" placeholder="Password">
                </td>
                <td>
                    <input type="password" name="conPass" id="conPass" placeholder="Confirm Password">
                </td>
            </tr>

            <tr>
                <td>
                    <input type="checkbox" name="term" id="term" value="terms">
                    <label for="term">Terms and Conditions</label>
                </td>
            </tr>
        </table>
        <br>
        <center>
            <input type="submit" value="CREATE">
        </center>
        
    </body>
</html>
